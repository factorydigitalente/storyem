<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORYEM：GAMEBOOK engine - ストリーム：ゲームブックエンジン</title>
<style>
/* --- 色テーマ変数定義 --- */
:root {
  /* 初期値はパターン1（黒系） */
  --bg-gradient: linear-gradient(135deg, #444, #333);
}

/* --- 1. 基本レイアウト・全体設定 --- */
body {
  font-family: sans-serif;
  background: var(--bg-gradient); /* 背景色は変数を使用 */
  background-attachment: fixed; /* スクロールしても背景を固定 */
  color: #eee; /* 基本文字色：明るいグレー */
  padding: 12px; /* 画面端の余白 */
  line-height: 1.6; /* 行間を広げて読みやすく */
  max-width: 800px; /* PC閲覧時の最大幅 */
  margin: auto; /* 画面中央に配置 */
  font-size: 16px; /* 標準フォントサイズ */
}

/* --- 色テーマ切り替えボタンのスタイル --- */
.theme-btn {
  width: 30px;
  height: 30px;
  min-height: 0 !important; /* min-height をリセットして、ボタン全般の 48px 設定を上書きします */
  aspect-ratio: 1 / 1; /* 正方形（正円） */
  flex-shrink: 0;      /* 横から押し潰されるのを防止 */
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.8); /* 少し透明感のある白縁 */
  /* 色テーマボタン内の色 */
  background: var(--next-theme-gradient, #fff) !important;
  /* 背景をボーダーの内側に閉じ込めます */
  background-clip: padding-box;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 0 0 8px rgba(0,0,0,0.4);
}

.theme-btn:hover {
  transform: scale(1.1);
}

.theme-btn:active {
  transform: scale(0.9); /* 押した時に少し凹む演出 */
}

h1 {
  font-size: 1.6em;
  text-align: left;
  margin: 0;
}

h1 img {
  /* ヘッダーロゴは画面幅の70%まで許容しつつ、最大280pxに制限 */
  max-width: 280px;
  width: 70%;
  height: auto;
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
  display: block; /* 余計な隙間を消去 */
}

button {
  padding: 10px 20px;
  background: #444; /* ボタンの通常背景色 */
  color: #eee;
  border: 1px solid #666;
  cursor: pointer;
  border-radius: 4px; /* 角を少し丸める */
  transition: 0.2s; /* ホバー時の色変化を滑らかに */
  min-height: 48px; /* モバイルでのタップミスを防ぐ最小高さ */
  font-size: 1em;
}

/* ボタンにマウスを乗せた時の色 */
button:hover { background: #666; }
/* 無効化（disabled）時の見た目 */
button:disabled { background: #222; color: #555; cursor: not-allowed; }

/* --- 2. ゲーム画面コンポーネント --- */
#game-area {
  position: relative; /* 子要素（ID表示など）の基準点 */
  background: url("default.png") center/cover no-repeat; /* 初期背景画像 */
  padding: 15px;
  border-radius: 8px;
  min-height: 400px;
  transition: background-image 0.5s ease-in-out; /* 背景切り替え時のフェード演出 */
  /* 四隅を暗くして没入感を出すヴィネット効果 */
  box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
  border: 2px solid #444;
}

/* statusバー全体：スマホでの折り返しと左端固定を両立 */
#status {
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: flex-start; /* 左詰めに固定して隙間を消す */
  flex-wrap: wrap;             /* スマホで入り切らない時に自動で2段にする */
  padding: 0;                  /* 内部余白は子要素で制御 */
  margin-bottom: 15px;
  background: #222;            /* ステータス欄の背景 */
  border-radius: 5px;
  border-left: 4px solid #888; /* 左側のアクセント線 */
  overflow: hidden;
  user-select: none;
  transition: all 0.2s ease-in-out;
  font-variant-numeric: tabular-nums; /* 数字の幅を一定にしてガタつき防止 */
  max-height: 120px; /* 3〜4行分くらいで止める */
  overflow-y: auto;  /* 超えたら枠内でスクロール */
}

/* 左端の矢印ボタン部分：ここを固定幅にすることで隙間問題を解決 */
#status::before {
  content: var(--status-arrow, "▼");
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;                /* 幅を固定 */
  min-width: 30px;
  background: rgba(255, 255, 255, 0.05);
  align-self: stretch;        /* バーが2段になっても高さを維持 */
  font-size: 10px;
  color: #555;
  border-right: 1px solid rgba(255, 255, 255, 0.1);
  margin-right: 10px;         /* 矢印と文字の間の距離 */
  transition: all 0.4s ease;
}

/* ステータス内の各項目（HPなど）の微調整 */
#status strong {
  color: #fff;
  margin: 0 2px;
}

/* 項目が途中で改行されないように保護 */
#status > span, #status > strong, #status > b {
  white-space: nowrap;
  padding: 5px 0; /* 上下に少しだけ余白を持たせる */
}

/* マウスホバー・アクティブ時の演出 */
#status:hover::before {
  color: #fff;
  text-shadow: 0 0 8px #2ecc71;
}
#status:active {
  transform: scale(0.98);
  filter: brightness(1.2);
}

#text { 
  margin-bottom: 20px; 
  white-space: pre-wrap; /* 改行をそのまま反映 */
  min-height: 100px; 
  font-size: 16px;
  transition: font-size 0.2s ease-out; /* サイズ変更を滑らかに */
  color: #fff;
  /* 文字に影を付けて可読性を向上 */
  text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  background: rgba(0, 0, 0, 0.5); /* 文章の可読性を上げる半透明の黒背景 */
  padding: 15px;
  padding-top: 30px; /* パラグラフID表示用のスペース */
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  position: relative;
  animation: fadeInText 0.5s ease-out; /* テキスト出現時のアニメ適用 */
  transition: font-size 0.2s ease-out, font-family 0.2s ease-out; /* フォント設定が切り替わったとき、0.2秒かけて変化させる */
}

/* 文章が下からふわっと出てくるアニメーション */
@keyframes fadeInText {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 画面右上に表示されるパラグラフID（§ 1など）の装飾 */
.paragraph-id {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.8em;
  font-family: 'Georgia', serif;
  color: rgba(255, 255, 255, 0.5); /* 主張しすぎない透明度 */
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

#options {
  display: flex;
  flex-direction: column; /* 選択肢ボタンを縦一列に並べる */
  gap: 10px;
}

/* 戦闘時のログ（ダメージ報告など） */
.log-battle {
  color: #fff;
  font-size: 1em;
  margin-top: 10px;
  border-top: 1px dashed #444; /* 区切り線 */
  padding-top: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

/* --- 3. サイコロ演出 --- */
#dice-display {
  position: relative;
  margin-top: 20px;
  margin-bottom: 20px;
  display: flex;
  justify-content: center; /* サイコロを中央寄せ */
  align-items: flex-start;
  gap: 20px;
  z-index: 10;
  width: 100%;
}

.dice {
  width: 45px;
  height: 45px;
  background: white;
  border-radius: 6px;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.8);
  animation: roll 0.3s ease-out; /* 振られた時のアニメ適用 */
}

/* サイコロの「目」の基本形状（ドット） */
.dice::before {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #333;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* data-value属性に基づいてbox-shadowで目を配置 */
.dice[data-value="1"]::before { background: red; width: 12px; height: 12px; }
.dice[data-value="2"]::before { background: transparent; box-shadow: -12px -12px #333, 12px 12px #333; }
.dice[data-value="3"]::before { box-shadow: -12px -12px #333, 12px 12px #333; }
.dice[data-value="4"]::before { background: transparent; box-shadow: -12px -12px #333, 12px -12px #333, -12px 12px #333, 12px 12px #333; }
.dice[data-value="5"]::before { box-shadow: -12px -12px #333, 12px -12px #333, -12px 12px #333, 12px 12px #333; }
.dice[data-value="6"]::before { background: transparent; box-shadow: -12px -12px #333, 12px -12px #333, -12px 12px #333, 12px 12px #333, -12px 0 #333, 12px 0 #333; }

/* サイコロが飛び出すようなアニメーション */
@keyframes roll {
  0% { transform: translateY(20px) rotate(-15deg); opacity: 0; }
  100% { transform: translateY(0) rotate(0); opacity: 1; }
}

/* --- 4. ヘッダー・メニュー・BGM --- */
.header-container {
  display: flex;
  /* 縦並びにする。HTML上の順序を逆転させ、UIを上に、ロゴを下に配置 */
  flex-direction: column-reverse; 
  align-items: flex-end; /* 右上のUIを基準に右寄せ */
  gap: 12px;
  margin-bottom: 20px;
}

.header-container h1 {
  width: 100%;       /* ロゴ（タイトル）を横幅いっぱいに解放 */
  text-align: left;  /* タイトル自体は左寄せに戻す */
}

/* 右側に集約された操作系（BGMレバーとメニュー） */
.header-right-ui {
  display: flex;
  flex-wrap: wrap;      /* 重要：幅が足りない時に自動で改行する */
  justify-content: flex-end; /* 右側に寄せる */
  align-items: center;
  gap: 5px; /* ボタン同士の隙間（marginを個別に書かなくて済む） */
  margin-left: auto;
  max-width: 100%;      /* 画面からはみ出さない */
}

/* BGM切り替え部分の囲み枠 */
#bgm-control {
  display: flex !important;
  align-items: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.15); /* 白みの強い半透明背景 */
  padding: 4px 10px !important;
  border-radius: 4px;
  height: 36px;
}

.bgm-label-text { font-size: 1em; color: #fff; white-space: nowrap; }

/* トグルスイッチの土台 */
.switch {
  position: relative;
  display: inline-block;
  width: 40px; 
  height: 20px;
  vertical-align: middle;
}

.switch input { opacity: 0; width: 0; height: 0; }

/* トグルスイッチのスライダー部分 */
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #444;
  transition: .4s;
  border-radius: 24px;
}

/* スライダーの中の丸いツマミ */
.slider:before {
  position: absolute;
  content: "";
  height: 14px;
  width: 14px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

/* ON状態の背景色（明るいエメラルド） */
input:checked + .slider { background-color: #2ecc71; }
/* ON状態のツマミの移動距離 */
input:checked + .slider:before { transform: translateX(20px); }

/* 右上のデバッグ/ファイルメニュー用ボタン */
.debug-btn {
  font-size: 0.8em;
  color:#eee;
  padding: 5px 10px;
  opacity: 1;
  background: #333;
  border: 1px solid #555;
  white-space: nowrap;
  min-height: 46px; 
}

/* --- 5. インポート・外部UI --- */
#studio-import {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #555;
}

/* 貼り付け用のテキストエリア */
#studio-import textarea {
  background: #666;
  color: #eee;
  font-family: monospace;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 8px;
  width: 100%;
}

/* 入力ヒント（プレースホルダー）の色設定 */
::placeholder { color: #ffffff; opacity: 0.7; }

/* インポート画面内の各種ボタン色 */
.btn-editor { background-color: #007bff; color: #fff; }
.btn-sample { background-color: #6c757d; color: #fff; font-size:1em;}
.btn-start { background-color: #007bff; color: #fff; font-size:1em;}

/* ホバー時の発光演出 */
.btn-editor:hover, .btn-start:hover { 
  background-color: #0069d9; 
  box-shadow: 0 4px 12px rgba(0,123,255,0.4); 
}
.btn-sample:hover { background-color: #5a6268; }

/* --- 6. その他・フッター --- */
#global-logo {
  margin-top: 50px;
  margin-bottom: 30px;
  text-align: center;
  /* pointer-events: none; */ /* クリックを貫通させる */
}

#global-logo img { max-width: 320px; height: auto; }

/* スマホ等、画面幅が480px以下の時の調整 */
@media (max-width: 480px) {
  .header-container h1 img { max-width: 150px; }
  .debug-btn { font-size: 0.8em; }
}

/* ロゴエリアのレスポンシブ調整 */
#global-logo div {
  width: 100%;           /* 親要素いっぱいに広げる */
  max-width: 500px;      /* PCでも広がりすぎないよう制限 */
  margin: 0 auto;        /* 中央寄せ */
  box-sizing: border-box; 
  padding: 0 10px;       /* 画面端の微調整 */
}

#global-logo img {
  height: auto;          /* アスペクト比を維持 */
  flex-shrink: 1;        /* 画面が狭い時に縮小を許可する */
  min-width: 0;          /* flex子要素の縮小を妨げないためのマジックコード */
}

/* スマホ用の個別調整 */
@media (max-width: 480px) {
  /* ロゴを包んでいる横並びの枠を調整 */
  #global-logo > div {
    gap: 10px !important;    /* ロゴ同士の隙間を狭くする */
    padding: 0 5px !important;
  }

  /* 1つ目のロゴ（STORYEM） */
  #global-logo a:first-child img {
    width: 220px !important;  /* ％ではなく実数で指定 */
    max-width: 65vw !important; /* 画面横幅の65%を上限にする */
    height: auto !important;
  }

  /* 2つ目のロゴ（FDE） */
  #global-logo a:last-child img {
    width: 120px !important;   /* ％ではなく実数で指定 */
    max-width: 30vw !important; /* 画面横幅の30%を上限にする */
    height: auto !important;
  }
}

#global-logo a {
  transition: opacity 0.2s;
}
#global-logo a:hover {
  opacity: 0.7; /* ホバー時に少し薄くする */
}


/* statusバー全体をクリッカブルにし、レイアウトを調整 */
#status {
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0; /* 内部の余白は子要素で調整 */
  overflow: hidden;
  user-select: none;
  transition: all 0.2s ease-in-out;
}

/* statusバー左端の細長いボタン部分 */
#status::before {
  content: var(--status-arrow, "▼");
  display: flex;
  align-items: center;
  justify-content: center;
  width: 25px;
  min-width: 25px;
  background: rgba(255, 255, 255, 0.05); /* ほとんど透けている */
  align-self: stretch;
  font-size: 10px; /* 少し小さめに */
  color: #555;     /* 暗めのグレー */
  border-right: 1px solid rgba(255, 255, 255, 0.1);
  margin-right: 10px;
  transition: all 0.4s ease; /* ゆっくり変化させることで刺激を抑える */
}
/* 触れたとき（意思があるとき）だけ灯る */
#status:hover::before {
  color: #fff;
  text-shadow: 0 0 8px #2ecc71;
}
/* ステータスの中身（テキスト部分）の余白 */
#status > strong, #status {
  padding-right: 10px;
}

#status:active {
  transform: scale(0.98); /* 2%だけ縮小 */
  filter: brightness(1.2); /* 少し明るく */
  transition: transform 0.1s;
}

/* ボタンを包むコンテナ：丁寧な長い文言でも崩れないように調整 */
.import-btn-container {
  display: flex;
  flex-wrap: wrap;       /* 幅が足りない時に自動で折り返す */
  justify-content: center;
  gap: 15px;             /* 縦並び・横並びどちらでもボタン間に15pxの隙間を確保 */
  margin-top: 15px;
  width: 100%;
}

/* コンテナ内のボタン共通設定 */
.import-btn-container button {
  flex: 1;               /* PCでは2つのボタンが同じ幅で並ぶ */
  min-width: 320px;      /* 文言が長いため、少し広めの320pxで折り返し判定 */
  max-width: 450px;      /* PCで見苦しく広がらないよう上限を設定 */
  padding: 12px 20px;    /* 丁寧なボタンにふさわしい、少し厚みのある余白 */
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
  line-height: 1.4;      /* 2行のテキストが読みやすい行間 */
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* スマホ等、非常に画面が狭い（480px以下）時の最終調整 */
@media (max-width: 480px) {
  .import-btn-container button {
    min-width: 100%;     /* スマホでは横幅いっぱいの押しやすいサイズに固定 */
    font-size: 0.95em;    /* 文字がはみ出さないよう、わずかに調整 */
  }
}

</style>
</head>
<body>

<div class="header-container">
  <h1>
    <img src="storyem_logo.png" alt="STORYEM LOGO">
  </h1>

  <div class="header-right-ui">
    <button id="font-size-toggle" class="debug-btn" onclick="nextFontSize()" style="min-width: 46px;">A+</button>
    <button id="font-style-toggle" class="debug-btn" onclick="nextFontStyle()" style="min-width: 42px;">Aa</button>
    <button id="img-mode-toggle" class="debug-btn" onclick="nextImgMode()" style="min-width: 52px;">🖼️ T</button>
    <button id="theme-toggle" class="theme-btn" onclick="nextTheme()" title="Change Color Theme"></button>
    <div id="bgm-control">
      <span class="bgm-label-text">♪</span>
      <label class="switch">
        <input type="checkbox" id="bgm-toggle" checked onchange="toggleBGM(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div id="file-menu">
      <button id="menu-btn" onclick="toggleSelectors()" class="debug-btn">▼📁</button>
    </div>
  </div>
</div>

<div id="file-controls" style="display:none;">
  <div id="rule-selector">
    <label for="rule-file">📘 ruleCSV ルール:</label>
    <input type="file" id="rule-file" accept=".csv">
  </div>
  <div id="scenario-selector">
    <label for="scenario-file">📜 scenarioCSV シナリオ:</label>
    <input type="file" id="scenario-file" accept=".csv">
  </div>
</div>

<!-- =======================
  手動CSVインポートエリア：ChatGPT等で生成したルールCSV + シナリオCSV をまとめて貼り付ける場所
======================= -->
<div id="studio-import" style="margin-top:10px; margin-bottom:20px; text-align:center; display:none;">

  <div style="margin-bottom: 15px;">
    <button onclick="window.open('studio.html', '_blank')" 
            class="btn-editor"
            style="padding: 10px 15px; font-size: 1em; font-weight:bold; width: auto; display: inline-block; border-radius: 5px;">
      🛠️ Open the CSV generation assistant “STORYEM GAMEBOOK studio” in a separate tab.<br>
      CSV生成アシスタント「STORYEM GAMEBOOK studio」を別タブで開く<br>
    </button>
    <p>→ It can use AI to create the rule CSV and scenario CSV to paste below.<br>
      以下に貼り付けるためのルールCSV＋シナリオCSVをAIで作れます<p>
  </div>

  <h3 style="text-align: left; margin-bottom: 8px; font-size: 1em; color: #ccc; border-left: 3px solid #007bff; padding-left: 10px;">

<script>
let player = {};
let maxHP = 0;
let ruleData = {};
let scenarioData = [];

// フォントサイズ設定 (0:小, 1:標準, 2:中, 3:大)
let fontSizeMode = 1;
const fontSizes = ["13px","16px", "20px", "24px"];
const fontSizeLabels = ["A-", "A", "A+", "A++"]; // サイズが大きくなることを示す視覚的ラベル

// 画像切り替え設定
let imgDisplayMode = 1; // 0:背景, 1:上部, 2:中間, 3:なし
const imgModeLabels = ["🖼️ B", "🖼️ T", "🖼️ M", "🖼️ X"];

// =======================
// BGM管理（常に1つだけ使う）
// =======================

// BGM再生用Audioインスタンス（使い回す）
let bgmAudio = new Audio();
bgmAudio.loop = true;  // 常にループ再生

// 現在再生中のBGMファイル名（文字列一致で判定）
let currentBGM = null;

// BGMのミュート状態を管理する変数
let isBGMMuted = false;

// =======================
// 共通バリデーション（サイズ・行数チェック）
// =======================
function validateCSV(text) {
  if (!text || text.trim() === "") {
    alert("Data is empty. データが空です。");
    return false;
  }

  // 文字数制限（30万文字）
  if (text.length > 300000) {
    alert("CSV size is too large (300,000 character limit) CSVサイズが大きすぎます（30万文字上限）");
    return false;
  }

  // 行数制限（2000行）
  const lines = text.split(/\r?\n/);
  if (lines.length > 2000) {
    alert("Too many paragraphs (lines) (2000 lines limit) 段落数（行数）が多すぎます（2000行上限）");
    return false;
  }

  return true; // すべてクリア
}


// ルールCSVパーサー
function parseRuleCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return {};

  const headers = lines[0].split(",");
  const values = lines[1].split(",");

  const rule = {};
  headers.forEach((h, i) => {
    rule[h.trim()] = values[i]?.trim();
  });

  return rule;
}

function applyRule(rule) {
  // タイトル変更
  if (rule.ttl) {
    document.querySelector("h1").innerText = rule.ttl;
    document.title = rule.ttl;
  }

  // 背景変更
  if (rule.bg) {
    document.getElementById("game-area").style.backgroundImage =
      `url(${rule.bg})`;
  }

  // 色テーマ設定の読み込み
  // CSVの列名は 'theme' と想定。未記入や不正値は applyTheme 側でガード
  const csvTheme = parseInt(rule.theme);
  applyTheme(csvTheme || 1);

  // ===== プレイヤー初期化 =====
  maxHP = parseInt(rule.max_hp) || 20;

  player = {
    hp: maxHP,
    skill: parseInt(rule.init_skill) || 7,
    luck: parseInt(rule.init_luck) || 7,
    food: parseInt(rule.init_food) || 2
  };
}

// --- CSVパースエンジン ---
function parseCSV(csvText) {
  const lines = csvText.split(/\r?\n/);
  const result = [];
  
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    const matches = line.match(/(".*?"|[^",\s][^,]*|(?<=,)(?=,)|(?<=,)$)/g);
    if (!matches) continue;

    const cleaned = matches.map(s => 
      s.replace(/^"|"$/g, '').trim()
    );

    // ★ IDの解析とバリデーション
    const rawId = cleaned[0];
    const id = parseInt(rawId, 10);

    // 数値でない（NaN）場合は警告を出してスキップ
    if (isNaN(id)) {
      console.warn(`警告: ${i + 1}行目のIDが数値ではありません。スキップします。内容: ${line}`);
      continue;
    }

    // ★ そのほかの列の解析。列不足でも安全にする
    const type      = cleaned[1];
    const rawText   = cleaned[2] || "";
    const optionsStr= cleaned[3] || "";
    const e_name    = cleaned[4] || "";
    const e_skill   = cleaned[5] || 0;
    const e_hp      = cleaned[6] || 0;
    const next      = cleaned[7] || 0;
    const bgm       = cleaned[8] || "";
    const bgi       = cleaned[9] || "";
    const effect    = cleaned[10] || "";

    const text = rawText.replace(/\\n/g, "\n");

    result.push({ 
      id: parseInt(id, 10), 
      type, 
      text,
      options: optionsStr
        ? optionsStr.split(",").map(opt => {
            const parts = opt.split("→");
            return { text: parts[0], to: parseInt(parts[1], 10) };
          })
        : [],
      enemy: { 
        name: e_name || "enemy 敵",
        skill: parseInt(e_skill) || 0,
        hp: parseInt(e_hp) || 0
      },
      battleNext: parseInt(next) || 0,
      bgm: bgm,
      bgi: bgi,
      effect: effect
    });
  }

  return result;
}

// UIの表示モードを切り替える関数
// mode: 'select' (ファイル選択画面) | 'game' (ゲーム画面)
function setUIMode(mode) {
  const fileControls = document.getElementById("file-controls");
  const ruleSelector = document.getElementById("rule-selector");
  const scenarioSelector = document.getElementById("scenario-selector");
  const gameUI = document.getElementById("game-ui");
  const studioImport = document.getElementById("studio-import"); 

  if (mode === 'select') {
    fileControls.style.display = "block";
    ruleSelector.style.display = "block";       // 明示的に表示
    scenarioSelector.style.display = "block";   // 明示的に表示
    gameUI.style.display = "none";
  } else {
    fileControls.style.display = "none";
    studioImport.style.display = "none";
    gameUI.style.display = "block";
  }
}

// --- ゲーム制御 ---
// startGame を拡張：URLにパラメータがあればそれを適用する
function startGame(paragraphs) {
  scenarioData = paragraphs;
  setUIMode('game');
  
  // メニューを閉じる
  const controls = document.getElementById("file-controls");
  const studio = document.getElementById("studio-import");
  if (controls) controls.style.display = "none";
  if (studio) studio.style.display = "none";

  const params = new URLSearchParams(window.location.search);
  
  // URLに 'p' (現在のパラグラフID) がある場合は、セーブデータとして読み込む
  if (params.has("p")) {
    console.log("URLからステータスを復元します...");
    
    const savedHP = parseInt(params.get("hp"));
    const savedMHP = parseInt(params.get("mhp"));
    const savedSK = parseInt(params.get("sk"));
    const savedLK = parseInt(params.get("lk"));
    const savedFD = parseInt(params.get("fd"));
    const savedP  = parseInt(params.get("p"));

    if (!isNaN(savedHP)) player.hp = savedHP;
    if (!isNaN(savedMHP)) maxHP = savedMHP;
    if (!isNaN(savedSK)) player.skill = savedSK;
    if (!isNaN(savedLK)) player.luck = savedLK;
    if (!isNaN(savedFD)) player.food = savedFD;

    updateStatus(); // 復元した数値を画面に反映
    showParagraph(savedP || 1);
  } else {
    // URLに何もない場合は、CSVの初期値のまま第1パラグラフを開始
    updateStatus(); 
    showParagraph(1);
  }
}

// メニューを強制的に「閉じ状態」にする共通関数
function forceCloseMenu() {
  const controls = document.getElementById("file-controls");
  const studio = document.getElementById("studio-import");
  const btn = document.getElementById("menu-btn");

  if (controls) controls.style.display = "none";
  if (studio) studio.style.display = "none";

  if (btn) {
    btn.innerText = "▼📁";
    btn.style.opacity = "0.6";
    btn.style.backgroundColor = "#333";

}

// 「別のファイルを読み込む」ボタンの処理
function resetAndShowSelectors() {
  bgmAudio.pause();
  bgmAudio.src = "";
  currentBGM = null;
  
  // モードを切り替える
  setUIMode('select');
  
  // 強制的に表示状態を上書き
  document.getElementById("rule-selector").style.setProperty("display", "block", "important");
  document.getElementById("scenario-selector").style.setProperty("display", "block", "important");
}

function updateStatus() {
  // 各項目を <span> で囲むことで、項目単位での折り返しを綺麗にします
  document.getElementById("status").innerHTML = `
    <span style="margin-right:12px;">❤️ HP: <strong>${player.hp}</strong> / ${maxHP}</span>
    <span style="margin-right:12px;">⚔️ Skill技: <strong>${player.skill}</strong></span>
    <span style="margin-right:12px;">🍀 Luck運: <strong>${player.luck}</strong></span>
    <span style="margin-right:12px;">🍞 Food食料: <strong>${player.food}</strong></span>
  `;
}

// --- パラグラフ表示処理 (食事機能を追加) ---
function showParagraph(id) {
  const p = scenarioData.find(x => x.id === id);
  if (!p) return;

  // --- 前回のバトルログや通知をリセット ---
  const logDiv = document.getElementById("log");
  if (logDiv) logDiv.innerText = "";

  handleBGM(p.bgm);

  // --- 背景画像の設定 ---
  const gameArea = document.getElementById("game-area");
  const imgTop = document.getElementById("img-container-top");
  const imgMid = document.getElementById("img-container-mid");

  // 全て初期化
  gameArea.style.backgroundImage = "none";
  imgTop.style.display = "none";
  imgMid.style.display = "none";
  imgTop.innerHTML = "";
  imgMid.innerHTML = "";

  const targetImg = (p.bgi && p.bgi.trim() !== "") ? p.bgi : ruleData.bg; //bgi列から読み込む

  if (targetImg && imgDisplayMode !== 3) {
    if (imgDisplayMode === 0) {
      // 背景モード
      gameArea.style.backgroundImage = `url(${targetImg})`;
    } else {
      // 挿入モード (innerHTMLを使うことで既存の要素構造を壊さない)
      const imgHtml = `<img src="${targetImg}" onerror="this.style.display='none'" style="width:100%; height:auto; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.5);">`;

      if (imgDisplayMode === 1) {
        imgTop.innerHTML = imgHtml;
        imgTop.style.display = "block";
      } else if (imgDisplayMode === 2) {
        imgMid.innerHTML = imgHtml;
        imgMid.style.display = "block";
      }
    }
  }

  // --- effect列による自動処理（!による再発動に対応） ---
  // シナリオCSVのeffect列の冒頭に「!」をつけると、そのパラグラフに留まる限り何度でも発動する。
  // 「!」をつけずにeatとした場合は、１度だけ発動する。
  // hp-2 と書けば、初回のみダメージ。
  // !hp-2 と書けば、訪れるたびにダメージ。
  if (p.effect) {
    // 命令が「!」で始まっているか判定（例: !hp-2 なら再発動モード）
    const isRepeatable = p.effect.startsWith("!");

    // 「まだ未訪問(!p.visited)」か、あるいは「再発動設定(isRepeatable)」である場合に実行
    if (!p.visited || isRepeatable) {
      
      // 解析用に「!」を取り除いた実際の命令文字列を取得
      const cmd = isRepeatable ? p.effect.slice(1) : p.effect;
      
      // 命令（hp-2など）からステータス名と数値を正規表現で抽出
      const match = cmd.match(/([a-z]+)([+-]\d+)/i);
      
      if (match) {
        const stat = match[1].toLowerCase(); // 例: hp
        const amount = parseInt(match[2], 10); // 例: -2

        // 対象のステータスを加減算
        if (stat === "food") player.food += amount;
        if (stat === "hp")   player.hp += amount;
        if (stat === "luck") player.luck += amount;

        // HPが最大値を超えないように、また死亡判定のため0未満にならないように調整
        if (player.hp > maxHP) player.hp = maxHP;
        if (player.hp < 0) player.hp = 0;

        // 画面上のログに変化を表示
        document.getElementById("log").innerText = `${stat} ${amount} ！`;

        // HPが最大値を超えないように調整
        if (player.hp > maxHP) player.hp = maxHP;
        // 0未満にならないように調整
        if (player.hp < 0) player.hp = 0;

        // 【ここが重要！】HPを計算した直後に画面上のステータス表示を更新する
        updateStatus();

        // 変化があったことをログに表示
        document.getElementById("log").innerText = `${stat} ${amount} ！`;

        // HPが0になった瞬間の死亡判定
        if (player.hp <= 0) {
          // 死亡時のテキストを表示
          document.getElementById("text").innerText = "...You're exhausted. Your adventure ends here. ……力尽きた。君の冒険はここで終わりだ。";
          
          // 選択肢をクリアし、リトライボタンだけを表示
          const optDiv = document.getElementById("options");
          optDiv.innerHTML = ""; 
          const retryBtn = document.createElement("button");
          retryBtn.innerText = "Play Again /最初からリトライ";
          retryBtn.onclick = () => restartGame();
          optDiv.appendChild(retryBtn);
          
          // 死亡したので、これ以降の処理を中断
          return; 
        }
      }
      // まだ生きている場合のみ、訪問済みフラグを立てる
      p.visited = true; 
    }
  }

  updateStatus();
  document.getElementById("text").innerText = p.text;

  // パラグラフID表示用の要素を作成して追加
  const idDisplay = document.createElement("span");
  idDisplay.className = "paragraph-id";
  idDisplay.innerText = `§ ${p.id}`; // 「§」や「No.」を付けるとそれっぽい
  document.getElementById("text").appendChild(idDisplay);

  // ログの初期化タイミングに注意（通知を残したい場合はここを調整）
  // document.getElementById("log").innerText = ""; // ←通知を消したくない場合はコメントアウト

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  // エンディング時のリスタート処理
  if (p.type === "end") {
    optDiv.innerHTML = "<strong>― The End 完 ―</strong><br>";
    const restartBtn = document.createElement("button");
    restartBtn.innerText = "Play Again (同じシナリオで最初から)";
    restartBtn.style.marginTop = "10px";
    restartBtn.style.backgroundColor = "#444";
    restartBtn.onclick = () => restartGame();
    optDiv.appendChild(restartBtn);
    return;
  }

  if (p.type === "battle") {
    startBattle(p);
  } else {
    // 通常の選択肢ボタン
    p.options.forEach(o => {
      const b = document.createElement("button");
      b.innerText = o.text;
      b.onclick = () => showParagraph(o.to);
      optDiv.appendChild(b);
    });

    // --- 食事ボタンの判定（!eatによる連食に対応） ---
    // 設定が "eat" もしくは "!eat" かつ、食料を1つ以上持っているか確認
    // シナリオCSVのeffect列に!eat と書けば、そのパラグラフに留まる限り何度でも食べられるようになる。
    // 「!」をつけずにeatとした場合は、１度だけ発動する。
    const isEatNode = (p.effect === "eat" || p.effect === "!eat");
    
    if (isEatNode && player.food > 0) {
      const eatBtn = document.createElement("button");
      eatBtn.innerText = `🍞 Eat food to restore HP 食料を食べてHP回復 (Remaining 残り:${player.food})`;
      eatBtn.style.backgroundColor = "#2d5a27";
      
      eatBtn.onclick = () => {
        // 食料を消費してHPを4回復させる
        player.food -= 1;
        player.hp += 4;
        
        // 最大HPを超えないようにガードし、画面表示を最新にする
        if (player.hp > maxHP) player.hp = maxHP;
        updateStatus();
        
        // 【分岐点】!がつかない通常の「eat」設定なら、1回食べた瞬間にボタンを消す
        // !がついた「!eat」設定なら、ボタンを残して連食を可能にする
        if (p.effect === "eat") {
          eatBtn.remove();
        } else {
          // !eatの場合は、ボタン内の残り個数表示を更新する
          eatBtn.innerText = `🍞 Eat food to restore HP 食料を食べてHP回復 (Remaining 残り:${player.food})`;
          // もし食べている途中で食料が尽きたらボタンを消去
          if (player.food <= 0) eatBtn.remove();
        }
        
        document.getElementById("log").innerText = "Recovered HP! 食事をして体力が回復した！";
      };
      optDiv.appendChild(eatBtn);
    }

  }
}

function startBattle(p) {
  let enemy = { ...p.enemy };
  const optDiv = document.getElementById("options");
  const logDiv = document.getElementById("log");

  const showBattleUI = (turnResultMsg = "") => {
    optDiv.innerHTML = "";
    logDiv.innerText = turnResultMsg;

    const attackBtn = document.createElement("button");

    const battleLabel = (p.options && p.options.length > 0)
      ? p.options[0].text
      : "Hit Each Other 打ち合う";

    attackBtn.innerText = `⚔️ ${battleLabel} (${enemy.name} HP:${enemy.hp} Skill技:${enemy.skill})`;

    attackBtn.onclick = () => processTurn(false);
    optDiv.appendChild(attackBtn);

    if (player.luck > 0) {
      const luckBtn = document.createElement("button");
      luckBtn.innerText = `🍀 Try Your Luck 運を試す (Luck運:${player.luck})`;
      luckBtn.style.borderColor = "#ffd700";
      luckBtn.onclick = () => processTurn(true);
      optDiv.appendChild(luckBtn);
    }
  };

  const processTurn = (useLuck) => {
    // --- 1. すべての数値をまず計算し、変数に「退避・記憶」させる ---
    
    // プレイヤーの攻撃出目
    const pD1 = Math.floor(Math.random() * 6) + 1;
    const pD2 = Math.floor(Math.random() * 6) + 1;
    const pTotal = pD1 + pD2 + player.skill;

    // 敵の攻撃出目
    const eD1 = Math.floor(Math.random() * 6) + 1;
    const eD2 = Math.floor(Math.random() * 6) + 1;
    const eTotal = eD1 + eD2 + enemy.skill;

    // 運試しの出目（使う場合のみ格納）
    let lD1 = null, lD2 = null, lTotal = null;

    let dmgToEnemy = 0;
    let dmgToPlayer = 0;
    let turnMsg = `You あなた:${pTotal} (⚔Skill技${player.skill}+🎲${pD1}+${pD2}) vs ${enemy.name}:${eTotal} (⚔Skill技${enemy.skill}+🎲${eD1}+${eD2}) \n➔ `;

    // --- 2. 判定ロジックの実行 ---
    if (pTotal > eTotal) {
      dmgToEnemy = 2;
      if (useLuck) {
        lD1 = Math.floor(Math.random() * 6) + 1;
        lD2 = Math.floor(Math.random() * 6) + 1;
        lTotal = lD1 + lD2;
        if (lTotal <= player.luck) {
          dmgToEnemy = 4;
          turnMsg += `【Luck Success! 運試し成功:${lTotal}】Extra Damage ダメージ増加(4)`;
        } else {
          dmgToEnemy = 1;
          turnMsg += `【Luck Failure! 運試し失敗:${lTotal}】Weakened Attack ダメージ減少(1)`;
        }
        player.luck--;
      } else {
        turnMsg += "Attack Success! 攻撃成功！";
      }
    } else if (eTotal > pTotal) {
      dmgToPlayer = 2;
      if (useLuck) {
        lD1 = Math.floor(Math.random() * 6) + 1;
        lD2 = Math.floor(Math.random() * 6) + 1;
        lTotal = lD1 + lD2;
        if (lTotal <= player.luck) {
          dmgToPlayer = 1;
          turnMsg += `【Luck Success! 運試し成功:${lTotal}】Damage Reduced 被害軽減(1)`;
        } else {
          dmgToPlayer = 3;
          turnMsg += `【Luck Failure! 運試し失敗:${lTotal}】Damage Increased 被害増加(3)`;
        }
        player.luck--;
      } else {
        turnMsg += "Attack failed! 攻撃失敗！";
      }
    } else {
      turnMsg += "Draw! 相打ち！";
    }

    // --- 3. 退避しておいたすべての出目を「ひとつの配列」にまとめて表示 ---
    // 戦闘の2個 + 敵の2個、もし運試しをしたならその2個を追加する
    const finalDiceArray = [pD1, pD2, eD1, eD2];
    if (lD1 !== null) {
      finalDiceArray.push(lD1, lD2);
    }

    renderDice(finalDiceArray);

    // --- 4. 最後にUIとステータスを更新 ---
    enemy.hp -= dmgToEnemy;

	// 敵のHPもマイナスにならないように保護（念のため）
	enemy.hp = Math.max(0, enemy.hp); 

	// プレイヤーのHPを更新（0未満にならないように Math.max を使用）
	player.hp = Math.max(0, player.hp - dmgToPlayer);

    updateStatus();

    if (player.hp <= 0) {
      document.getElementById("text").innerText = "You are exhausted... 力尽きた...";
      optDiv.innerHTML = `<button onclick="restartGame()">Play Again /最初からリトライ</button>`;
    } else if (enemy.hp <= 0) {
      logDiv.innerText = turnMsg + "\nYou Win! 勝利した！";
      optDiv.innerHTML = `<button onclick="showParagraph(${p.battleNext})">Proceed to next 次へ進む</button>`;
    } else {
      showBattleUI(turnMsg);
    }

  };

  showBattleUI("The battle begins! 戦闘開始！");
}

// サイコロを描画する関数（将来的に1つ、2つどちらにも対応）
function renderDice(values) {
  // サイコロ表示エリアを取得し、前回表示をクリア
  const container = document.getElementById("dice-display");
  container.innerHTML = "";

  /*
    values 配列の構造は以下の順番で入ってくる：

    [0,1] = プレイヤー（あなた）
    [2,3] = 敵（相手）
    [4,5] = 運試し（存在する場合のみ）

    これを「2個1セット」でグループ化して表示する。
  */
  const groups = [
    { label: "You あなた", dice: values.slice(0, 2) },
    { label: "Enemy 相手", dice: values.slice(2, 4) }
  ];

  // 運試しがある場合のみ3つ目のグループを追加
  if (values.length > 4) {
    groups.push({ label: "Luck Test 運試し", dice: values.slice(4, 6) });
  }

  /*
    サイコロ1個は45px幅。
    2個 + gap(5px) = 45 + 45 + 5 = 95px

    ラベルを「2個のサイコロ領域の中央」に正確に置くため、
    サイコロ列とラベルの幅を固定(95px)で揃える。
  */
  const GROUP_WIDTH = 95;

  groups.forEach(group => {

    // 1グループ（ラベル＋サイコロ列）を縦並びにする
    const groupDiv = document.createElement("div");
    groupDiv.style.display = "flex";
    groupDiv.style.flexDirection = "column";
    groupDiv.style.alignItems = "center";

    // ===== ラベル =====
    const label = document.createElement("div");
    label.innerText = group.label;

    label.style.width = GROUP_WIDTH + "px"; // サイコロ列と同じ幅にする
    label.style.textAlign = "center";       // その幅の中央に文字を配置
    label.style.fontSize = "0.7em";
    label.style.marginBottom = "5px";

    // ===== サイコロ横並び部分 =====
    const diceRow = document.createElement("div");
    diceRow.style.display = "flex";
    diceRow.style.gap = "5px";
    diceRow.style.width = GROUP_WIDTH + "px";   // 幅を固定
    diceRow.style.justifyContent = "center";    // 中央寄せ

    // 2個のサイコロを生成
    group.dice.forEach(val => {
      const dice = document.createElement("div");
      dice.className = "dice";
      dice.dataset.value = val;  // CSS側で目を描画
      diceRow.appendChild(dice);
    });

    // ラベル → サイコロ の順で追加
    groupDiv.appendChild(label);
    groupDiv.appendChild(diceRow);

    // 全体コンテナに追加
    container.appendChild(groupDiv);
  });
}

// 「振る」「表示する」「合計を返す」をセットにした関数
function rollDice(count = 2) {
  const results = [];
  let total = 0;

  for (let i = 0; i < count; i++) {
    const val = Math.floor(Math.random() * 6) + 1;
    results.push(val);
    total += val;
  }

  // 画面右下のサイコロ表示を更新
  renderDice(results); 

  // 合計値を返す（計算に使用）
  return { total, results };
}

// リスタート用の共通関数（URLパラメータの初期化付き）
function restartGame() {
  // 1. 全パラグラフの訪問済みフラグをリセット
  scenarioData.forEach(p => p.visited = false);

  // 2. プレイヤーのステータスを初期値に戻す
  applyRule(ruleData);

  // 3. 重要：URLのパラメータをクリアして初期状態（?なし）に戻す
  // これをしないと、リロードした時に古いデータ(HP 0など)を読み込んでしまいます
  if (window.history.replaceState) {
    const url = window.location.protocol + "//" + window.location.host + window.location.pathname;
    window.history.replaceState(null, '', url);
  }

  // 4. 最初のパラグラフを表示
  showParagraph(1);

  console.log("Game restarted and URL cleared. ゲームを初期化し、URLもリセットしました。");
}

// =======================
// パラグラフBGM制御
// =======================
function handleBGM(newBGM) {

  // BGM指定がない場合 → 停止
  if (!newBGM) {
    if (currentBGM !== null) {
      bgmAudio.pause();
      bgmAudio.src = "";
      currentBGM = null;
    }
    return;
  }

  // 同じBGMなら何もしない
  if (newBGM === currentBGM) return;

  // 切り替え処理
  bgmAudio.pause();
  bgmAudio.src = newBGM;
  bgmAudio.currentTime = 0;

  currentBGM = newBGM;

  // 「BGMレバーがチェックされているか」を直接見に行く
  const isChecked = document.getElementById("bgm-toggle").checked;
  
  if (isChecked) {
    bgmAudio.play().catch(e => console.log("Waiting for BGM to play BGM再生待ち"));
  } else {
    console.log("BGM is on standby by lever BGMはレバーにより待機中");
  }
}

// =======================
// 手動CSV貼り付けインポート機能
// =======================
// 仕様：
// ・入力欄に「ルールCSV」と「シナリオCSV」をまとめて貼る
// ・"ttl," で始まる行をルール開始とみなす
// ・"id,type" で始まる行をシナリオ開始とみなす
// ・そこから自動分離して解析する
function importCSV() {

  // 1. 入力欄からテキストを取得し、BOMを除去
  let raw = document.getElementById("csv-input").value.replace(/^\ufeff/, "").trim();

  // 2. バリデーション
  if (!validateCSV(raw)) return;

  // 3. ルール(ttl,)とシナリオ(id,type)の位置を特定
  const lines = raw.split(/\r?\n/);
  const ruleStart = lines.findIndex(line => line.trim().startsWith("ttl,"));
  const scenarioStart = lines.findIndex(line => line.trim().startsWith("id,type"));

  if (ruleStart === -1 || scenarioStart === -1) {
    alert("CSV形式が正しくありません。ttl, または id,type が見つかりません。");
    return;
  }

  // 4. それぞれを抽出
  const ruleCSV = lines.slice(ruleStart, scenarioStart).filter(line => isValidCSVLine(line)).join("\n");
  const scenarioCSV = lines.slice(scenarioStart).filter(line => isValidCSVLine(line)).join("\n");

  try {
    // --- 【徹底リセット】古いゲームの残骸をすべて消去 ---
    scenarioData = [];
    player = {}; 
    maxHP = 0;
    currentBGM = null;
    if (bgmAudio) {
      bgmAudio.pause();
      bgmAudio.src = "";
    }
    // 画面のログとダイス表示もクリア
    document.getElementById("log").innerText = "";
    document.getElementById("dice-display").innerHTML = "";

    // 5. ルールの解析と「初期ステータス」の適用
    ruleData = parseRuleCSV(ruleCSV);
    applyRule(ruleData); // ここでCSVに書かれたHPや技術点の初期値が一旦セットされる

    // 6. シナリオを解析して startGame へ
    const parsedScenario = parseCSV(scenarioCSV);
    
    // ★重要：ここで startGame を呼ぶ。
    // startGame 側で「URLに続きがあるか」を判定し、あれば上書き、なければ初期値で開始する。
    startGame(parsedScenario);

    console.log("Import successful: States initialized.");

  } catch (err) {
    console.error(err);
    alert("CSV解析エラーが発生しました。");
  }
}


// =======================
// CSVとして有効な行だけを通すフィルタ
// =======================
function isValidCSVLine(line) {

  const trimmed = line.trim();

  // 空行除外
  if (!trimmed) return false;

  // コードブロック記号除外
  if (trimmed.startsWith("```")) return false;

  // ChatGPT等の説明文的な行を軽く除外（必要なら拡張可能）
  if (trimmed.startsWith("#")) return false;

  return true;
}

// --- 色テーマ管理用の変数と定義 ---
let currentThemeIndex = 1; // 1: 黒, 2: 緑, 3: 茶

const themes = {
  1: "linear-gradient(135deg, #444, #333)",        // 1: 黒・グレー（無彩色）
  2: "linear-gradient(135deg, #611f1f, #2b0a0a)", // 2: 赤（情熱・危機）
  3: "linear-gradient(135deg, #635a2d, #2e2a14)", // 3: 黄・金（砂漠・財宝）
  4: "linear-gradient(135deg, #2a4d2a, #152915)", // 4: 緑（森林・休息）
  5: "linear-gradient(135deg, #1a2e1a, #0d1a0d)", // 5: 深緑（深い森・迷宮）
  6: "linear-gradient(135deg, #1a3a5f, #0a182b)", // 6: 青（深海・夜）
  7: "linear-gradient(135deg, #4b2c5e, #1f1129)", // 7: 紫（魔法・神秘）
  8: "linear-gradient(135deg, #5d4037, #2b1d1a)", // 8: 茶（土・遺跡）
  9: "linear-gradient(135deg, #3e2723, #1b0000)"  // 9: 濃茶（泥・腐敗）
};

// 色テーマを適用し、ボタンの「次」の色をセットする
function applyTheme(index) {
  // 範囲チェック（不正な値や未記入は1にする）
  const totalThemes = Object.keys(themes).length;
  const idx = (index >= 1 && index <= totalThemes) ? index : 1;
  currentThemeIndex = idx;

  // 画面全体の背景を適用
  document.documentElement.style.setProperty('--bg-gradient', themes[idx]);

  // 「次」の色をCSS変数としてルート（全体）にセット
  // これにより、ボタンが後から読み込まれても自動的にこの色が適用されます
  const nextIdx = (idx % totalThemes) + 1;
  document.documentElement.style.setProperty('--next-theme-gradient', themes[nextIdx]);
}

// ボタンクリック時の処理（シンプルに！）
function nextTheme() {
  const totalThemes = Object.keys(themes).length; // 色テーマのconst themes内の総テーマ数を自動取得
  const nextIdx = (currentThemeIndex % totalThemes) + 1;
  applyTheme(nextIdx);
}

  if (currentText && currentText.length > 0) {
    // 最後に表示したパラグラフIDを探して再描画
    const idMatch = document.querySelector(".paragraph-id")?.innerText.match(/\d+/);
    if (idMatch) showParagraph(parseInt(idMatch[0]));
  }
}

// フォントサイズ切り替え
function nextFontSize() {
  fontSizeMode = (fontSizeMode + 1) % 4;
  
  const textDiv = document.getElementById("text");
  const fontBtn = document.getElementById("font-size-toggle");
  
  if (textDiv) {
    // textエリアのみフォントサイズを変更
    textDiv.style.fontSize = fontSizes[fontSizeMode];
  }
  
  if (fontBtn) {
    // ボタンの表示を更新
    fontBtn.innerText = fontSizeLabels[fontSizeMode];
  }
}

// フォントスタイル (0: Sans-serif系, 1: Serif系)
let fontStyleMode = 0; 
const fontFamilies = [
  // Sans: ゴシック/黑体
  "sans-serif, 'Microsoft YaHei', 'SimHei', 'Arial'", 
  // Serif: 明朝/宋体
  "serif, 'SimSun', 'STSong', 'Times New Roman'"
];
const fontStyleLabels = ["Aa", "Aa"]; //["Font:Sans", "Font:Serif"]とすれば見た目を区別できるが一旦統一

function nextFontStyle() {
  fontStyleMode = (fontStyleMode + 1) % 2;
  const textDiv = document.getElementById("text");
  const styleBtn = document.getElementById("font-style-toggle");
  
  if (textDiv) {
    // 既存のサイズ設定などは維持したまま、フォント系統だけを上書き
    textDiv.style.fontFamily = fontFamilies[fontStyleMode];
  }
  
  if (styleBtn) {
    // ボタンのテキストを更新
    styleBtn.innerText = fontStyleLabels[fontStyleMode];
  }
}

// --- ステータスバーの位置の管理 ---
let statusPositionMode = 0; // 0:初期位置, 1:中段(midとoptionsの間), 2:下段(optionsとlogの間)

function rotateStatusPosition() {
  statusPositionMode = (statusPositionMode + 1) % 3;
  applyStatusPosition();
}

function applyStatusPosition() {
  const status = document.getElementById("status");
  const gameUI = document.getElementById("game-ui");
  const imgMid = document.getElementById("img-container-mid");
  const options = document.getElementById("options");
  const log = document.getElementById("log");

  // 一旦マージンをリセット
  status.style.marginTop = "0px";
  status.style.marginBottom = "15px";

  if (statusPositionMode === 0) {
    // 0: デフォルト（game-uiの先頭、imgTopの前）
    gameUI.insertBefore(status, gameUI.firstChild);
    status.style.setProperty('--status-arrow', '"▼"');
  } else if (statusPositionMode === 1) {
    // 1: mid画像とoptionsの間
    gameUI.insertBefore(status, options);
    status.style.setProperty('--status-arrow', '"▲▼"');
  } else if (statusPositionMode === 2) {
    // 2: optionsとlogの間
    gameUI.insertBefore(status, log);
    status.style.marginTop = "15px"; // 余白
    status.style.marginBottom = "10px"; // 余白
    status.style.setProperty('--status-arrow', '"▲"');
  }
}

// 初期設定としてクリックイベントを登録
document.getElementById("status").onclick = rotateStatusPosition;

/**
 * 現在のゲーム状態をURLパラメータに反映させる関数
 * 実行タイミング：パラグラフ移動時、ステータス更新時、バトル終了時
 */
function updateURLParameters() {
  const pMatch = document.querySelector(".paragraph-id")?.innerText.match(/\d+/);
  const currentP = pMatch ? pMatch[0] : 1;

  const params = new URLSearchParams();
  params.set("p", currentP);        // 現在のパラグラフ
  params.set("hp", player.hp);      // 現在のHP
  params.set("mhp", maxHP);         // 最大HP
  params.set("sk", player.skill);   // 技術点
  params.set("lk", player.luck);    // 運点
  params.set("fd", player.food);    // 食料数

  // ブラウザの履歴を汚さずにURLを書き換える（ページはリロードされません）
  const newRelativePathQuery = window.location.pathname + '?' + params.toString();
  window.history.replaceState(null, '', newRelativePathQuery);
}

// 既存の関数にフック（割り込み）を入れます
// 1. ステータス更新時にURLも更新
const originalUpdateStatus = updateStatus;
updateStatus = function() {
  originalUpdateStatus();
  updateURLParameters();
};

// 2. パラグラフ表示完了時にURLも更新
const originalShowParagraph = showParagraph;
showParagraph = function(id) {
  originalShowParagraph(id);
  updateURLParameters();
};

</script>
